version: '3.8'

services:
  oracle:
    image: gvenzl/oracle-xe:21-slim-faststart
    container_name: fulusy-oracle-xe
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: oracle
      APP_USER: fulusy
      APP_USER_PASSWORD: fulusy
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

volumes:
  oracle-data:
    name: fulusy-oracle-data
