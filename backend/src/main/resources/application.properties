# ============================================================
# Fulusy Backend Configuration
# ============================================================
quarkus.application.name=fulusy-backend
quarkus.http.port=8080
# ============================================================
# JWT Configuration (verification only - signing is done manually)
# ============================================================
mp.jwt.verify.issuer=https://fulusy.app
mp.jwt.verify.algorithm=HS256
mp.jwt.verify.publickey=${JWT_SIGN_KEY:change-me-to-a-long-random-string-at-least-32-chars-long}
# ============================================================
# Gemini API
# ============================================================
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.base-url=https://generativelanguage.googleapis.com
gemini.model=gemini-2.0-flash
gemini.max-tokens=1024
# ============================================================
# PROD profile
# ============================================================
%prod.quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.jdbc.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/fulusy}
%prod.quarkus.datasource.username=${DATABASE_USER:postgres}
%prod.quarkus.datasource.password=${DATABASE_PASSWORD:postgres}
%prod.quarkus.hibernate-orm.database.generation=none
%prod.quarkus.hibernate-orm.log.sql=false
%prod.quarkus.flyway.migrate-at-start=true
%prod.quarkus.flyway.baseline-on-migrate=true
%prod.quarkus.flyway.locations=db/migration/postgres
%prod.quarkus.log.level=INFO
# ============================================================
# DEV profile
# ============================================================
%dev.quarkus.datasource.db-kind=oracle
%dev.quarkus.datasource.username=fulusy
%dev.quarkus.datasource.password=fulusy
%dev.quarkus.datasource.jdbc.url=jdbc:oracle:thin:@localhost:1521/XEPDB1
%dev.quarkus.hibernate-orm.database.generation=none
%dev.quarkus.hibernate-orm.log.sql=true
%dev.quarkus.flyway.migrate-at-start=true
%dev.quarkus.flyway.baseline-on-migrate=true
%dev.quarkus.flyway.locations=db/migration/oracle
%dev.quarkus.log.category."com.fulusy".level=DEBUG
# ============================================================
# TEST profile
# ============================================================
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:test;MODE=Oracle;DB_CLOSE_DELAY=-1
%test.quarkus.hibernate-orm.database.generation=drop-and-create
%test.quarkus.flyway.migrate-at-start=false
%test.quarkus.flyway.enabled=false
